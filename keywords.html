<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>关键词管理 - Sherpa 语音唤醒</title>
    <link rel="stylesheet" href="styles/keywords.css" />
  </head>
  <body>
    <!-- 头部 -->
    <header class="header">
      <div class="header-content">
        <a href="index.html" class="back-link">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          返回唤醒测试
        </a>
        <h1>关键词管理</h1>
      </div>
    </header>

    <!-- 主容器 -->
    <main class="container">
      <div class="card">
        <!-- 使用说明 -->
        <div class="info-box">
          <h3>使用说明</h3>
          <p>每行输入一个关键词，支持以下格式：</p>
          <ul>
            <li><strong>中文</strong>：如 <code>小爱同学</code>、<code>小艺小艺</code></li>
            <li><strong>英文</strong>：如 <code>Hi_Siri</code>、<code>Hey_Google</code>（下划线会被替换为空格）</li>
            <li><strong>混合</strong>：如 <code>Hello_小智</code></li>
          </ul>
          <p>系统会自动将关键词转换为音素格式供语音识别使用。</p>
        </div>

        <!-- 输入区 -->
        <div class="input-section">
          <label class="input-label" for="keyword-input">关键词列表</label>
          <textarea
            id="keyword-input"
            class="keyword-input"
            placeholder="例如：
Hi_Siri
小爱同学
Hey_Google"></textarea>
          <div class="input-meta">
            <span class="keyword-count">共 <span class="count" id="keyword-count">0</span> 个关键词</span>
          </div>
        </div>

        <!-- 按钮组 -->
        <div class="btn-group">
          <button class="btn btn-primary" id="preview-btn">预览转换</button>
          <button class="btn btn-success" id="save-btn">保存并生成</button>
        </div>

        <!-- 状态条 -->
        <div class="status-bar" id="status-bar"></div>

        <!-- 预览区 -->
        <div class="preview-section" id="preview-section" style="display: none;">
          <h3>转换预览</h3>
          <div class="preview-table-container">
            <table class="preview-table">
              <thead>
                <tr>
                  <th>原始关键词</th>
                  <th>转换后的音素表示</th>
                </tr>
              </thead>
              <tbody id="preview-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script src="renderer-keywords.js"></script>
  </body>
</html>
