<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sherpa 语音唤醒测试</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <!-- 头部 -->
    <header class="header">
      <h1>Sherpa 语音唤醒测试</h1>
      <p>基于 sherpa-onnx 的离线唤醒 + 在线语音识别</p>
    </header>

    <!-- 主容器 -->
    <main class="container">
      <!-- 工具栏 -->
      <div class="toolbar">
        <a href="keywords.html" class="toolbar-link">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          关键词管理
        </a>
      </div>

      <!-- 录音控制卡片 -->
      <div class="card control-section">
        <div class="control-wrapper">
          <button id="record-btn" class="record-btn stopped">开始录音</button>
          <!-- 状态显示 -->
          <div class="status-lines">
            <div id="status-kws" class="status-line">
              <span class="status-dot"></span>
              <span class="status-text">等待语音唤醒</span>
            </div>
            <div id="status-asr" class="status-line">
              <span class="status-dot"></span>
              <span class="status-text">语音识别中</span>
            </div>
          </div>
        </div>
        <div id="status" class="status-bar">点击按钮开始录音</div>
      </div>

      <!-- ASR 识别区 -->
      <div id="asr-box" class="card asr-section">
        <h2 class="card-title">语音识别</h2>
        <div class="asr-header">
          <span id="silence-timer" class="silence-timer"></span>
        </div>
        <div class="asr-content">
          <div id="asr-text" class="asr-text">等待说话...</div>
          <div id="asr-status" class="asr-status"></div>
        </div>
      </div>

      <!-- AI 对话区 -->
      <div id="chat-box" class="card chat-section">
        <h2 class="card-title">AI 回复</h2>
        <div class="chat-content">
          <div id="chat-user" class="chat-message user"></div>
          <div class="chat-message ai">
            <div id="chat-ai-text"></div>
            <button id="chat-ai-play" class="play-btn" title="播放">🔊</button>
          </div>
          <div id="chat-status" class="chat-status"></div>
        </div>
      </div>

      <!-- 识别历史 -->
      <div class="card">
        <h2 class="card-title">识别历史</h2>
        <div id="history-container" class="history-section">
          <div class="history-empty">暂无识别记录</div>
        </div>
      </div>

      <!-- 唤醒记录 -->
      <div class="card">
        <h2 class="card-title">唤醒记录</h2>
        <div id="log-container" class="log-section">
          <div class="log-empty">暂无唤醒记录</div>
        </div>
      </div>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
