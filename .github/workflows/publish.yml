name: Build and Auto Release
on:
  push:
    branches: [ main ]  # 你想触发的分支

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w sherpa-onnx-node

      - name: Build app
        run: npm run build -- --publish never
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      # 👇 自动生成时间戳 tag（避免重复，不需要你手动打 tag）
      - name: Generate tag
        id: tag
        run: echo "tag=auto-build-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
        shell: bash

      # 👇 自动发布到 GitHub Releases
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/*.exe
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
